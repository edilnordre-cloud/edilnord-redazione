<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Redazione Edilnord</title>
<link rel="icon" href="https://edilnordre.it/wp-content/uploads/2025/02/cropped-favicon-logo-tondo-270x270.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#9DC0AA; --sage-ink:#3f6b52; --sage-soft:#e7f0ea;
  --bg:#f0efeb; --surface:#ffffff; --surface-2:#f7f6f2;
  --ink:#1d1d1b; --ink-2:#48473f; --muted:#67655c; --line:#e2e0d8; --line-2:#d3d0c6;
  --danger:#e63946; --danger-soft:#fbe4e6;
  --terr:#9DC0AA; --terr-ink:#3f6b52; --terr-soft:#e7f0ea;
  --dati:#5b7b8a; --dati-ink:#3c5763; --dati-soft:#e5edf0;
  --reale:#c8794a; --reale-ink:#8f4f28; --reale-soft:#f6e8dd;
  --reel:#2f2e2c; --reel-ink:#2f2e2c; --reel-soft:#e6e4de;
  --ok:#3f8f5f; --ok-soft:#e3f1e8; --warn:#b9821f; --warn-soft:#f6ecd5;
  --radius:14px; --radius-sm:9px; --radius-lg:20px;
  --shadow-1:0 1px 2px rgba(29,29,27,.04),0 1px 3px rgba(29,29,27,.06);
  --shadow-2:0 4px 12px rgba(29,29,27,.07),0 12px 28px rgba(29,29,27,.06);
  --shadow-3:0 18px 50px rgba(29,29,27,.16);
  --e-out:cubic-bezier(.22,1,.36,1); --e-io:cubic-bezier(.65,0,.35,1);
  --z-header:100; --z-drag:200; --z-sheet:300; --z-modal-bd:400; --z-modal:410; --z-toast:500;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;
  min-height:100vh;overflow-x:hidden;
}
h1,h2,h3,h4{line-height:1.08;font-weight:700}
.anton{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.01em;text-transform:uppercase}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:var(--ink)}
a{color:var(--sage-ink)}
::placeholder{color:var(--muted);opacity:1}
:focus-visible{outline:2.5px solid var(--sage-ink);outline-offset:2px;border-radius:4px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.side{
  position:sticky;top:0;height:100vh;background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:20px 14px;gap:4px;z-index:var(--z-header)
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.brand img{width:38px;height:38px;border-radius:9px;flex:none}
.brand .bt{font-family:'Anton',sans-serif;font-size:19px;letter-spacing:.02em;line-height:.95;text-transform:uppercase}
.brand .bs{font-size:10.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-top:2px}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);
  color:var(--ink-2);font-weight:600;font-size:14px;text-align:left;transition:background .16s var(--e-out),color .16s
}
.nav button .ic{font-size:17px;width:20px;text-align:center;flex:none}
.nav button:hover{background:var(--surface-2)}
.nav button.on{background:var(--sage-soft);color:var(--sage-ink)}
.nav button .badge{margin-left:auto;background:var(--danger);color:#fff;font-size:11px;font-weight:700;min-width:19px;height:19px;padding:0 5px;border-radius:10px;display:grid;place-items:center}
.side-foot{border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:8px}
.dry-pill{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;padding:8px 10px;border-radius:var(--radius-sm);letter-spacing:.02em}
.dry-pill.on{background:var(--warn-soft);color:var(--warn)}
.dry-pill.off{background:var(--danger-soft);color:var(--danger)}
.dry-pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:none}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.content{padding:28px 34px 80px;max-width:1320px;width:100%;margin:0 auto;flex:1}

/* ---------- Vacation banner ---------- */
.vac-banner{
  background:linear-gradient(100deg,var(--reale-soft),#fbf1e8);border:1px solid #eed6c3;
  border-radius:var(--radius);padding:14px 18px;margin-bottom:22px;display:flex;gap:14px;align-items:flex-start
}
.vac-banner .vi{font-size:22px;line-height:1}
.vac-banner b{color:var(--reale-ink)}
.vac-banner .warn{color:var(--danger);font-weight:600}

/* ---------- Page head ---------- */
.phead{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:24px;flex-wrap:wrap}
.phead h1{font-family:'Anton',sans-serif;font-weight:400;font-size:clamp(30px,4.4vw,46px);letter-spacing:.005em;text-transform:uppercase;text-wrap:balance}
.phead .sub{color:var(--muted);font-size:14px;margin-top:5px;max-width:60ch}
.hrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;transition:transform .12s var(--e-out),background .16s,box-shadow .16s,border-color .16s;white-space:nowrap;min-height:42px}
.btn:active{transform:translateY(1px)}
.btn-p{background:var(--sage);color:#123322;box-shadow:var(--shadow-1)}
.btn-p:hover{background:#8fb79c;box-shadow:var(--shadow-2)}
.btn-d{background:var(--ink);color:#fff}
.btn-d:hover{background:#333}
.btn-g{background:var(--surface);color:var(--ink);border:1px solid var(--line-2)}
.btn-g:hover{background:var(--surface-2);border-color:var(--muted)}
.btn-danger{background:var(--danger-soft);color:var(--danger)}
.btn-danger:hover{background:#f7d3d7}
.btn-sm{padding:7px 12px;min-height:36px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn .sp{width:15px;height:15px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.iconbtn{width:40px;height:40px;border-radius:var(--radius-sm);display:grid;place-items:center;font-size:17px;color:var(--ink-2);border:1px solid transparent}
.iconbtn:hover{background:var(--surface-2);border-color:var(--line)}

/* ---------- Pillars & status ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:700;letter-spacing:.01em;white-space:nowrap}
.p-territorio{background:var(--terr-soft);color:var(--terr-ink)}
.p-dati{background:var(--dati-soft);color:var(--dati-ink)}
.p-reale{background:var(--reale-soft);color:var(--reale-ink)}
.p-reel{background:var(--reel-soft);color:var(--reel-ink)}
.p-esterno{background:#eceae3;color:var(--muted)}
.st{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.st .d{width:7px;height:7px;border-radius:50%;background:currentColor}
.st-vuoto{background:#efeee9;color:var(--muted)}
.st-bozza{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line-2)}
.st-pronto{background:var(--dati-soft);color:var(--dati-ink)}
.st-approvato,.st-ok_confermato{background:var(--warn-soft);color:var(--warn)}
.st-pubblicato{background:var(--ok-soft);color:var(--ok)}
.st-errore{background:var(--danger-soft);color:var(--danger);cursor:pointer}
.st-bloccato,.st-saltato{background:#e7e5df;color:var(--ink-2)}
.st-cestino{background:#eceae3;color:var(--muted)}

/* ---------- Calendar ---------- */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{padding:7px 15px;border-radius:7px;font-weight:600;font-size:13px;color:var(--ink-2);transition:.15s var(--e-out)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-1)}
.monthnav{display:flex;align-items:center;gap:6px}
.monthnav .mlabel{font-family:'Anton',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:.01em;min-width:172px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:2px 0 6px}
.cal-cell{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);min-height:112px;padding:8px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s,box-shadow .15s}
.cal-cell.out{background:transparent;border-color:transparent}
.cal-cell.today{border-color:var(--sage);box-shadow:0 0 0 1px var(--sage)}
.cal-cell.drop{border-color:var(--sage-ink);border-style:dashed;background:var(--sage-soft)}
.cal-day{font-family:'Anton',sans-serif;font-size:15px;color:var(--ink-2)}
.cal-cell.today .cal-day{color:var(--sage-ink)}
.slot{border:1px solid var(--line);border-radius:8px;padding:6px 7px;font-size:11.5px;line-height:1.25;cursor:pointer;background:var(--surface);transition:transform .12s var(--e-out),box-shadow .12s,border-color .12s;position:relative}
.slot:hover{box-shadow:var(--shadow-1);border-color:var(--line-2);transform:translateY(-1px)}
.slot .stitle{font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.slot .smeta{display:flex;align-items:center;gap:5px;margin-top:4px;color:var(--muted);font-size:10px;font-weight:600}
.slot .sbar{position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px}
.slot.pl-territorio .sbar{background:var(--terr)}
.slot.pl-dati .sbar{background:var(--dati)}
.slot.pl-reale .sbar{background:var(--reale)}
.slot.pl-reel .sbar{background:var(--reel)}
.slot.pl-esterno{border-style:dashed;opacity:.72}
.slot{padding-left:13px}
.slot[draggable=true]{cursor:grab}
.slot.dragging{opacity:.4}

/* list view */
.clist{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.crow{display:grid;grid-template-columns:96px 1fr auto;gap:14px;align-items:center;background:var(--surface);padding:13px 16px;cursor:pointer;transition:background .14s}
.crow:hover{background:var(--surface-2)}
.crow .cdate{font-family:'Anton',sans-serif;font-size:14px;color:var(--ink-2);line-height:1.1}
.crow .cdate small{display:block;font-family:'Montserrat';font-size:11px;color:var(--muted);font-weight:600}
.crow .ctitle{font-weight:600;min-width:0}
.crow .ctitle small{display:block;color:var(--muted);font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow .cactions{display:flex;gap:6px;align-items:center}

/* ---------- Idee ---------- */
.idea-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.idea{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow-1);transition:box-shadow .18s,transform .18s var(--e-out)}
.idea:hover{box-shadow:var(--shadow-2);transform:translateY(-2px)}
.idea h3{font-size:17px;line-height:1.25;text-wrap:balance}
.idea .angle{color:var(--ink-2);font-size:13px}
.idea .brief{font-size:12px;color:var(--muted);background:var(--surface-2);border-radius:8px;padding:8px 10px}
.idea .ia{display:flex;gap:8px;margin-top:auto;padding-top:4px}
.idea .ia .btn{flex:1}
.idea .score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;background:var(--ok-soft);color:var(--ok);margin-left:auto}
.idea .score.mid{background:var(--warn-soft);color:var(--warn)}
.idea .reader-q{font-size:13px;font-style:italic;color:var(--ink-2);border-left:3px solid var(--sage);padding-left:9px}
.idea details.domande{font-size:12px;color:var(--ink-2)}
.idea details.domande summary{cursor:pointer;color:var(--muted);user-select:none;list-style:none;padding:2px 0}
.idea details.domande ol{margin:6px 0 0 16px;display:flex;flex-direction:column;gap:3px}
.idea.idea-dev{border-left:3px solid var(--sage);opacity:.92}
.idea.idea-dev h3{font-size:15px}
.idea.idea-dev .inp{resize:vertical;min-height:56px;font-size:13px;padding:8px 10px;width:100%}
.dev-section-title{font-size:15px;font-weight:700;color:var(--ink-2);margin:30px 0 14px;padding-bottom:9px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}

/* ---------- Composer ---------- */
.composer{display:grid;grid-template-columns:1fr;gap:0}
.stepper{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:7px;margin-bottom:22px;overflow-x:auto}
.stepper button{flex:1;min-width:104px;display:flex;flex-direction:column;gap:3px;align-items:flex-start;padding:9px 12px;border-radius:var(--radius-sm);transition:.16s var(--e-out);position:relative}
.stepper button .sn{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.stepper button .sl{font-weight:700;font-size:13.5px;color:var(--ink-2)}
.stepper button.on{background:var(--ink)}
.stepper button.on .sn{color:var(--sage)}
.stepper button.on .sl{color:#fff}
.stepper button.done .sn::after{content:" ✓";color:var(--ok)}
.stepper button:disabled{opacity:.45;cursor:not-allowed}
.cwrap{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.9fr);gap:24px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-1)}
.panel h2{font-size:20px;margin-bottom:4px}
.panel .pd{color:var(--muted);font-size:13px;margin-bottom:18px}
.field{margin-bottom:17px}
.field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.field .hint{color:var(--muted);font-weight:500;font-size:12px}
.inp,.ta,.sel{width:100%;padding:11px 13px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--radius-sm);transition:border-color .15s,background .15s}
.inp:focus,.ta:focus,.sel:focus{background:var(--surface);border-color:var(--sage-ink);outline:none}
.ta{resize:vertical;min-height:96px;line-height:1.55}
.ta.big{min-height:220px}
.qopts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.qopt{padding:8px 13px;border:1px solid var(--line-2);border-radius:100px;font-size:13px;font-weight:600;background:var(--surface);transition:.14s var(--e-out)}
.qopt:hover{border-color:var(--sage)}
.qopt.on{background:var(--sage);color:#123322;border-color:var(--sage)}
.qcard{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px;margin-bottom:13px;background:var(--surface-2)}
.qcard .qq{font-weight:600;margin-bottom:9px;font-size:14px}
.qcard .qtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.cbar{display:flex;gap:10px;justify-content:space-between;margin-top:24px;flex-wrap:wrap}
.gate-warn{display:flex;gap:10px;align-items:flex-start;background:var(--warn-soft);color:#7a5a12;border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;font-weight:500;margin-top:6px}

/* media briefs & thumbs */
.brief-box{background:var(--sage-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:18px;font-size:13.5px;color:var(--sage-ink)}
.brief-box b{display:block;margin-bottom:3px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.hook-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.hook-card{border:2px solid var(--line-2);border-radius:var(--radius);padding:22px 20px 18px;cursor:pointer;background:var(--surface);transition:border-color .15s,box-shadow .15s,background .15s}
.hook-card:hover{border-color:var(--sage);box-shadow:var(--shadow-2)}
.hook-card.on{border-color:var(--sage-ink);background:var(--sage-soft);box-shadow:var(--shadow-2)}
.hook-tipo-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px}
.hook-card.on .hook-tipo-badge{color:var(--sage-ink)}
.hook-preview{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;line-height:1.05;color:var(--ink);margin-bottom:12px;letter-spacing:.01em}
.hook-chars{font-size:11px;color:var(--muted);font-weight:600}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:12px}
.thumb{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--line-2);background:var(--surface-2)}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
.thumb .rm{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:6px;background:rgba(29,29,27,.72);color:#fff;display:grid;place-items:center;font-size:13px}
.thumb .rm:hover{background:var(--danger)}
.drop-media{border:2px dashed var(--line-2);border-radius:var(--radius-sm);padding:26px;text-align:center;color:var(--muted);transition:.15s;cursor:pointer;font-size:13px}
.drop-media:hover,.drop-media.over{border-color:var(--sage-ink);background:var(--sage-soft);color:var(--sage-ink)}
.reel-modes{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.rmode{border:1.5px solid var(--line-2);border-radius:var(--radius-sm);padding:14px;text-align:left;transition:.15s var(--e-out)}
.rmode.on{border-color:var(--sage-ink);background:var(--sage-soft)}
.rmode .rt{font-weight:700;font-size:13.5px;margin-bottom:3px}
.rmode .rdz{font-size:11.5px;color:var(--muted)}
.rmode.on .rdz{color:var(--sage-ink)}

/* IG preview */
.ig-preview{position:sticky;top:24px}
.ig-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-2)}
.ig-top{display:flex;align-items:center;gap:9px;padding:11px 13px}
.ig-top img{width:32px;height:32px;border-radius:50%}
.ig-top .ign{font-weight:700;font-size:13px}
.ig-top .igl{font-size:11px;color:var(--muted)}
.ig-media{aspect-ratio:1;background:var(--surface-2);position:relative;overflow:hidden;display:grid;place-items:center}
.ig-media img,.ig-media video{width:100%;height:100%;object-fit:cover}
.ig-media.reel{aspect-ratio:9/16;max-height:440px;background:#111}
.ig-media .empty{color:var(--muted);font-size:12px;text-align:center;padding:20px}
.ig-media .cnt{position:absolute;top:9px;right:9px;background:rgba(29,29,27,.66);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px}
.ig-actions{display:flex;gap:15px;padding:10px 13px 4px;font-size:19px;color:var(--ink)}
.ig-actions .r{margin-left:auto}
.ig-cap{padding:2px 13px 15px;font-size:13px;line-height:1.5}
.ig-cap .ign{font-weight:700;margin-right:6px}
.ig-cap .more{color:var(--muted)}
.blog-prev{padding:20px;font-size:13px;line-height:1.7;max-height:420px;overflow:auto}
.blog-prev h1{font-family:'Anton';font-size:24px;margin-bottom:12px;text-transform:none}
.blog-prev h2{font-size:17px;margin:16px 0 7px}
.blog-prev p{margin-bottom:10px}

/* ---------- Batch table ---------- */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
table.batch{width:100%;border-collapse:collapse;min-width:820px;font-size:13px}
table.batch th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:12px 12px;border-bottom:1px solid var(--line);font-weight:700;background:var(--surface-2)}
table.batch td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
table.batch tr:last-child td{border-bottom:none}
table.batch tr.nofoto{background:var(--warn-soft)}
table.batch .tin{width:100%;border:1px solid transparent;background:transparent;padding:6px 7px;border-radius:6px;font-size:13px}
table.batch .tin:hover{border-color:var(--line-2)}
table.batch .tin:focus{border-color:var(--sage-ink);background:var(--surface);outline:none}
.bulkbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;background:var(--ink);border-radius:var(--radius);padding:11px 16px;margin-bottom:16px;color:#fff}
.bulkbar .bc{font-weight:700;font-size:13px;margin-right:auto}

/* ---------- Lista spesa ---------- */
.spesa-place{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.spesa-place .sph{display:flex;align-items:center;gap:9px;padding:14px 17px;background:var(--surface-2);border-bottom:1px solid var(--line);font-weight:700}
.spesa-place .sph .pin{font-size:17px}
.spesa-item{display:flex;gap:12px;align-items:center;padding:12px 17px;border-bottom:1px solid var(--line)}
.spesa-item:last-child{border-bottom:none}
.spesa-item.done{opacity:.5}
.spesa-item .chk{width:24px;height:24px;border:2px solid var(--line-2);border-radius:7px;flex:none;display:grid;place-items:center;cursor:pointer;transition:.14s}
.spesa-item .chk.on{background:var(--sage);border-color:var(--sage);color:#123322}
.spesa-item .si-txt{flex:1;min-width:0}
.spesa-item .si-txt b{font-size:13.5px}
.spesa-item .si-txt small{display:block;color:var(--muted);font-size:12px}

/* ---------- Modal / sheet ---------- */
.backdrop{position:fixed;inset:0;background:rgba(29,29,27,.42);backdrop-filter:blur(2px);z-index:var(--z-modal-bd);opacity:0;animation:fade .2s var(--e-out) forwards;display:grid;place-items:center;padding:20px}
@keyframes fade{to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-3);max-width:480px;width:100%;padding:26px;z-index:var(--z-modal);animation:pop .24s var(--e-out)}
@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-size:20px;margin-bottom:8px}
.modal p{color:var(--ink-2);font-size:14px;margin-bottom:18px}
.modal .ma{display:flex;gap:10px;justify-content:flex-end}
.gate .lock{font-size:30px;margin-bottom:10px}

/* ---------- Toast ---------- */
.toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:var(--z-toast);max-width:min(94vw,380px)}
.toast{background:var(--ink);color:#fff;padding:13px 16px;border-radius:var(--radius-sm);box-shadow:var(--shadow-3);font-size:13.5px;font-weight:500;display:flex;gap:10px;align-items:flex-start;animation:slidein .28s var(--e-out)}
.toast.ok{background:var(--ok)}.toast.err{background:var(--danger)}.toast.warn{background:var(--warn)}
.toast .tt{flex:1}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

/* ---------- empty / spinner ---------- */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .ei{font-size:40px;margin-bottom:12px;opacity:.6}
.empty-state h3{font-size:18px;color:var(--ink-2);margin-bottom:6px}
.loading{display:flex;align-items:center;justify-content:center;gap:11px;padding:60px;color:var(--muted);font-weight:600}
.loading .sp{width:22px;height:22px;border:3px solid var(--line-2);border-right-color:var(--sage-ink);border-radius:50%;animation:spin .7s linear infinite}
.progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:10px}
.progress i{display:block;height:100%;background:var(--sage-ink);border-radius:6px;transition:width .3s var(--e-out)}

/* ---------- Responsive ---------- */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;bottom:0;top:auto;left:0;right:0;height:auto;flex-direction:row;border-right:none;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:var(--z-header);box-shadow:0 -4px 18px rgba(29,29,27,.07)}
  .brand,.side-foot{display:none}
  .nav{flex-direction:row;gap:0;justify-content:space-around;width:100%}
  .nav button{flex-direction:column;gap:3px;padding:7px 4px;font-size:10px;font-weight:600;border-radius:9px;flex:1;text-align:center;align-items:center}
  .nav button .ic{font-size:20px}
  .nav button span:not(.ic):not(.badge){font-size:10px}
  .nav button .badge{position:absolute;top:2px;right:calc(50% - 20px);margin:0}
  .nav button{position:relative}
  .topbar{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .topbar img{width:30px;height:30px;border-radius:7px}
  .topbar .tt{font-family:'Anton';font-size:16px;text-transform:uppercase;letter-spacing:.02em}
  .topbar .dry-pill{margin-left:auto}
  .content{padding:20px 16px 96px}
  .cwrap{grid-template-columns:1fr}
  .ig-preview{position:static;order:-1;margin-bottom:20px}
  .drag-hint{display:none}
  .monthnav .mlabel{min-width:120px;font-size:17px}
  .cal-grid{gap:3px}
  .cal-cell{min-height:auto;padding:5px}
  .cal-grid,.clist,.content>*{max-width:100%}
  .cal-day{font-size:12px}
  .slot .stitle{-webkit-line-clamp:1}
  .reel-modes{grid-template-columns:1fr}
  .crow{grid-template-columns:70px 1fr;gap:10px}
  .crow .cactions{grid-column:1/-1;justify-content:flex-start}
  .phead h1{font-size:29px}
}
@media(max-width:560px){
  .cal-grid .cal-dow:nth-child(n){font-size:9px}
  .cal-cell .slot{font-size:10px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toasts" id="toasts"></div>
<div id="modal-root"></div>

<script>
"use strict";
/* ============================================================
   Redazione Edilnord — app statica (vanilla). Chiama i webhook n8n.
   Chiave X-Redazione-Key tenuta SOLO in memoria (mai localStorage).
   ============================================================ */
const API = "https://n8n.edilnordre.it/webhook";
const IG_USER = "edilnordre";
const LOGO = "https://edilnordre.it/wp-content/uploads/2025/02/cropped-favicon-logo-tondo-270x270.webp";
const PILLARS = {
  territorio:{label:"Territorio",emoji:"🏘️",perc:"conosce il paese"},
  dati:{label:"Dati",emoji:"📊",perc:"sa i numeri"},
  reale:{label:"Vetrina",emoji:"🏠",perc:"vende davvero"},
  reel:{label:"Reel",emoji:"🎬",perc:"raggiunge chi non ti segue"},
  esterno:{label:"Esterno",emoji:"📌",perc:""}
};
const MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DOW=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

const S = {
  key:null, ready:false, view:"calendario", loading:true,
  data:{calendario:[], idee:[], config:{}, immobili:[]},
  calMode:"mese", calMonth:new Date(2026,6,1),
  composer:null,           // stato composer attivo
  batch:null,              // stato modalità batch
  spesaChecked:{},
  busy:false
};

/* ---------- utils ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...c)=>{const e=document.createElement(t);for(const k in a){if(k==="class")e.className=a[k];else if(k==="html")e.innerHTML=a[k];else if(k.startsWith("on"))e.addEventListener(k.slice(2),a[k]);else if(typeof a[k]==="boolean")e[k]=a[k];else if(a[k]!=null)e.setAttribute(k,a[k]);}for(const x of c.flat()){if(x==null||x===false)continue;e.append(x.nodeType?x:document.createTextNode(x));}return e;};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const uid=p=>p+"-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,6);
function toast(msg,type="",ms=3800){const t=el("div",{class:"toast "+type},el("span",{class:"tt"},msg));$("#toasts").append(t);setTimeout(()=>{t.style.transition="opacity .3s,transform .3s";t.style.opacity="0";t.style.transform="translateX(20px)";setTimeout(()=>t.remove(),320);},ms);}
function fmtDate(ds){if(!ds)return "";const[y,m,d]=ds.split("-").map(Number);return d+" "+MONTHS[m-1].slice(0,3).toLowerCase();}
function dowOf(ds){const[y,m,d]=ds.split("-").map(Number);return (new Date(Date.UTC(y,m-1,d)).getUTCDay()+6)%7;}
function todayStr(){const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");}

/* ---------- API ---------- */
async function api(path,body,{method="POST"}={}){
  const opt={method,headers:{"X-Redazione-Key":S.key}};
  if(body!==undefined){opt.headers["Content-Type"]="application/json";opt.body=JSON.stringify(body);}
  const r=await fetch(API+"/"+path,opt);
  if(r.status===401)throw new Error("Chiave non valida (401).");
  if(!r.ok)throw new Error("Errore rete ("+r.status+").");
  const ct=r.headers.get("content-type")||"";
  return ct.includes("json")?r.json():r.text();
}
async function uploadFoto(file){
  const rt=file.type.startsWith("video/")?"video":"image";
  const fd=new FormData();
  fd.append("file",file,file.name||(rt==="video"?"media.mp4":"foto.jpg"));
  fd.append("upload_preset","edilnordre");
  fd.append("folder","contenuti");
  const r=await fetch("https://api.cloudinary.com/v1_1/duwp3az9m/"+rt+"/upload",{method:"POST",body:fd});
  if(!r.ok)throw new Error("Upload Cloudinary fallito ("+r.status+").");
  const j=await r.json();
  if(j.error)throw new Error(j.error.message||"Upload rifiutato.");
  return {url:j.secure_url,id:j.public_id};
}

/* ---------- data helpers ---------- */
const cfg=(k,d)=>{const v=S.data.config[k];return v==null||v===""?d:v;};
const isDry=()=>String(cfg("DRY_RUN","true")).toLowerCase()!=="false";
function vacInfo(){
  const on=String(cfg("VACANZA_ATTIVA","false")).toLowerCase()==="true";
  const i=cfg("VACANZA_INIZIO",""),f=cfg("VACANZA_FINE","");
  const today=todayStr();
  const active=on&&i&&f&&today>=i&&today<=f;
  return {on,i,f,active};
}
function slotById(id){return S.data.calendario.find(c=>c.id===id);}
function visibleSlots(){return S.data.calendario.filter(c=>c.stato!=="cestino");}

/* ============================================================ RENDER ROOT */
function render(){
  const root=$("#root");root.innerHTML="";
  if(!S.ready){root.append(Gate());return;}
  root.append(Shell());
}
function nav(v){S.view=v;S.composer=(v==="composer")?S.composer:null;render();window.scrollTo(0,0);}

/* ---------- Gate (key entry) ---------- */
function Gate(){
  const wrap=el("div",{class:"backdrop"});
  let val="";
  const inp=el("input",{class:"inp",type:"password",placeholder:"Incolla la chiave…",style:"margin-bottom:14px",
    oninput:e=>val=e.target.value.trim(),
    onkeydown:e=>{if(e.key==="Enter")go();}});
  const btn=el("button",{class:"btn btn-p",style:"width:100%",onclick:go},"Entra in Redazione");
  async function go(){
    if(!val){toast("Inserisci la chiave.","warn");return;}
    S.key=val;btn.disabled=true;btn.textContent="Verifico…";
    try{await loadAll();S.ready=true;render();toast("Benvenuto in Redazione.","ok");}
    catch(e){S.key=null;btn.disabled=false;btn.textContent="Entra in Redazione";toast(e.message||"Accesso negato.","err");}
  }
  const m=el("div",{class:"modal gate"},
    el("div",{class:"lock"},"🔐"),
    el("h2",{class:"anton",style:"font-size:26px"},"Redazione Edilnord"),
    el("p",{},"Centro editoriale di Edilnord RE. Inserisci la chiave di accesso: resta solo in questa sessione, non viene salvata."),
    inp,btn
  );
  wrap.append(m);setTimeout(()=>inp.focus(),80);return wrap;
}

async function loadAll(){
  S.loading=true;
  const res=await api("redazione-carica-dati",{});
  S.data.calendario=(res.calendario||[]).map(normSlot);
  S.data.idee=res.idee||[];
  S.data.config=res.config||{};
  S.data.immobili=res.immobili||[];
  S.loading=false;
}
function normSlot(r){r.stato=r.stato||"vuoto";return r;}

/* ---------- Shell ---------- */
function Shell(){
  const app=el("div",{class:"app"});
  const ideeNew=S.data.idee.filter(i=>i.stato==="nuova").length;
  const bozzeCount=S.data.calendario.filter(s=>s.stato==="bozza"&&s.tipo!=="esterno").length;
  const navItems=[
    ["calendario","🗓️","Calendario"],["bozze","📝","Bozze",bozzeCount||null],
    ["idee","💡","Idee",ideeNew],
    ["composer","✍️","Composer"],["batch","🗂️","Batch"],
    ["spesa","🛒","Lista spesa"],["impostazioni","⚙️","Impostazioni"]
  ];
  const side=el("aside",{class:"side"},
    el("div",{class:"brand"},el("img",{src:LOGO,alt:"Edilnord"}),
      el("div",{},el("div",{class:"bt"},"Redazione"),el("div",{class:"bs"},"Edilnord RE"))),
    el("nav",{class:"nav"},...navItems.map(([v,ic,lb,bd])=>
      el("button",{class:S.view===v?"on":"",onclick:()=>nav(v)},
        el("span",{class:"ic"},ic),el("span",{},lb),
        bd?el("span",{class:"badge"},String(bd)):null))),
    el("div",{class:"side-foot"},dryPill(),
      el("div",{style:"font-size:11px;color:var(--muted);text-align:center;line-height:1.4"},
        "Cliente-obiettivo:",el("br"),el("b",{style:"color:var(--ink-2)"},"il proprietario che vende")))
  );
  const main=el("main",{class:"main"},
    el("div",{class:"topbar"},el("img",{src:LOGO}),el("span",{class:"tt"},"Redazione"),dryPill()),
    el("div",{class:"content"},views())
  );
  app.append(side,main);
  return app;
}
function dryPill(){
  const dry=isDry();
  return el("div",{class:"dry-pill "+(dry?"on":"off")},el("span",{class:"dot"}),
    dry?"DRY-RUN · simulazione":"LIVE · pubblica davvero");
}
function views(){
  if(S.loading)return el("div",{class:"loading"},el("span",{class:"sp"}),"Carico la redazione…");
  switch(S.view){
    case"calendario":return CalendarView();
    case"bozze":return BozzeView();
    case"idee":return IdeeView();
    case"composer":return ComposerView();
    case"batch":return BatchView();
    case"spesa":return SpesaView();
    case"impostazioni":return SettingsView();
  }
}

/* ============================================================ BOZZE */
function BozzeView(){
  const bozze=S.data.calendario.filter(s=>s.stato==="bozza"&&s.tipo!=="esterno")
    .sort((a,b)=>a.data>b.data?1:a.data<b.data?-1:0);
  const frag=el("div",{});
  frag.append(el("div",{class:"phead"},
    el("div",{},el("h1",{},"Bozze"),
      el("div",{class:"sub"},"Contenuti iniziati ma non ancora pronti. Riaprili nel Composer per completarli.")),
    el("button",{class:"btn btn-p",onclick:()=>startComposer()},"＋ Nuovo contenuto")));
  if(!bozze.length){
    frag.append(el("div",{class:"empty-state",style:"text-align:center;padding:60px 20px;color:var(--muted)"},
      el("div",{style:"font-size:48px;margin-bottom:16px"},"📝"),
      el("div",{style:"font-size:18px;font-weight:600;color:var(--ink-2);margin-bottom:8px"},"Nessuna bozza"),
      el("div",{},"Le bozze appaiono qui quando salvi un contenuto non ancora pronto.")));
    return frag;
  }
  const PILL={territorio:"#9DC0AA",dati:"#5B7FA6",reale:"#C87F5A",reel:"#9DC0AA"};
  const list=el("div",{style:"display:flex;flex-direction:column;gap:12px"});
  bozze.forEach(s=>{
    const accent=PILL[s.pilastro]||"#9DC0AA";
    const card=el("div",{class:"card",style:"display:flex;align-items:center;gap:16px;padding:16px 20px"});
    const dot=el("div",{style:`width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0`});
    const info=el("div",{style:"flex:1;min-width:0"});
    const titolo=el("div",{style:"font-weight:700;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"},s.titolo||s.note||"(senza titolo)");
    const meta=el("div",{style:"font-size:12px;color:var(--muted);margin-top:3px"},
      (s.data?fmtDate(s.data)+" · ":"Senza data · ")+capitalize(s.pilastro)+" · "+tipoLabel(s.tipo));
    info.append(titolo,meta);
    const btnRiapri=el("button",{class:"btn btn-g btn-sm",onclick:()=>{
      const slot=slotById(s.id);
      if(slot)startComposer(slot);
      else toast("Slot non trovato.","err");
    }},"✎ Riapri");
    const btnElimina=el("button",{class:"btn btn-g btn-sm",style:"color:var(--err,#c0392b)",onclick:()=>eliminaBozza(s.id)},"✕ Elimina");
    card.append(dot,info,btnRiapri,btnElimina);
    list.append(card);
  });
  frag.append(list);
  return frag;
}
function capitalize(s){return s?s[0].toUpperCase()+s.slice(1):"";}
function tipoLabel(t){const m={post_ig:"Post IG",articolo_blog:"Blog+Post",reel:"Reel",entrambi:"Blog+Post"};return m[t]||t||"";}

/* ============================================================ CALENDARIO */
function CalendarView(){
  const frag=el("div",{});
  const v=vacInfo();
  if(v.on&&v.i&&v.f)frag.append(vacBanner(v));
  frag.append(el("div",{class:"phead"},
    el("div",{},el("h1",{},"Calendario"),
      el("div",{class:"sub"},"Il piano editoriale comanda: Lun Territorio · Mer Dati · Ven Vetrina · Sab Reel. Ogni contenuto costruisce memoria locale verso chi possiede casa qui.")),
    el("div",{class:"hrow"},
      el("div",{class:"seg"},
        el("button",{class:S.calMode==="mese"?"on":"",onclick:()=>{S.calMode="mese";render();}},"Mese"),
        el("button",{class:S.calMode==="lista"?"on":"",onclick:()=>{S.calMode="lista";render();}},"Lista")),
      el("button",{class:"btn btn-p",onclick:()=>startComposer()},"＋ Nuovo contenuto"))
  ));
  frag.append(S.calMode==="mese"?calMonth():calList());
  return frag;
}
function vacBanner(v){
  const slots=visibleSlots().filter(c=>c.data>=v.i&&c.data<=v.f&&c.tipo!=="esterno");
  const pronti=slots.filter(c=>["pronto","ok_confermato","approvato"].includes(c.stato)).length;
  const scoperti=slots.filter(c=>["vuoto","bozza"].includes(c.stato)).length;
  const flagged=slots.filter(c=>String(c.richiedi_ok_esplicito).toLowerCase()==="true"&&["pronto","ok_confermato"].includes(c.stato)).length;
  const titolo=v.active?"Modalità Vacanza attiva":"Modalità Vacanza programmata";
  return el("div",{class:"vac-banner"},el("span",{class:"vi"},"🏖️"),
    el("div",{},
      el("div",{},el("b",{},titolo),` dal ${fmtDate(v.i)} al ${fmtDate(v.f)}. `,
        `${pronti} contenuti pronti escono da soli, ${scoperti} slot ancora scoperti nel periodo.`),
      scoperti>0?el("div",{class:"warn",style:"margin-top:4px"},`⚠ Ci sono ${scoperti} giorni senza contenuto approvato nel periodo di chiusura.`):null,
      flagged>0?el("div",{class:"warn",style:"margin-top:4px"},`⚠ ${flagged} contenuti hanno "OK esplicito": in vacanza NON usciranno. Toglilo o non verranno pubblicati.`):null
    ));
}
function calMonth(){
  const y=S.calMonth.getFullYear(),m=S.calMonth.getMonth();
  const first=new Date(y,m,1);const startDow=(first.getDay()+6)%7;
  const days=new Date(y,m+1,0).getDate();
  const grid=el("div",{class:"cal-grid"});
  DOW.forEach(d=>grid.append(el("div",{class:"cal-dow"},d)));
  const byDate={};visibleSlots().forEach(s=>{(byDate[s.data]=byDate[s.data]||[]).push(s);});
  for(let i=0;i<startDow;i++)grid.append(el("div",{class:"cal-cell out"}));
  const today=todayStr();
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const cell=el("div",{class:"cal-cell"+(ds===today?" today":"")});
    cell.dataset.date=ds;
    cell.append(el("div",{class:"cal-day"},String(d)));
    (byDate[ds]||[]).sort((a,b)=>(a.ora||"").localeCompare(b.ora||"")).forEach(s=>cell.append(slotChip(s)));
    // drop target (desktop)
    cell.addEventListener("dragover",e=>{if(S._drag){e.preventDefault();cell.classList.add("drop");}});
    cell.addEventListener("dragleave",()=>cell.classList.remove("drop"));
    cell.addEventListener("drop",e=>{e.preventDefault();cell.classList.remove("drop");if(S._drag)moveSlot(S._drag,ds);});
    grid.append(cell);
  }
  const wrap=el("div",{},
    el("div",{class:"hrow",style:"justify-content:space-between;margin-bottom:16px"},
      el("div",{class:"monthnav"},
        el("button",{class:"iconbtn",onclick:()=>{S.calMonth=new Date(y,m-1,1);render();}},"‹"),
        el("span",{class:"mlabel"},MONTHS[m]+" "+y),
        el("button",{class:"iconbtn",onclick:()=>{S.calMonth=new Date(y,m+1,1);render();}},"›")),
      el("div",{class:"drag-hint",style:"font-size:12px;color:var(--muted)"},"Trascina uno slot su un altro giorno per spostarlo")),
    grid);
  return wrap;
}
function slotChip(s){
  const p=PILLARS[s.pilastro]||PILLARS.esterno;
  const c=el("div",{class:`slot pl-${s.pilastro} st-wrap`,title:(s.titolo||p.label)});
  if(s.tipo!=="esterno"&&s.stato!=="pubblicato"){
    c.draggable=true;
    c.addEventListener("dragstart",()=>{S._drag=s.id;c.classList.add("dragging");});
    c.addEventListener("dragend",()=>{S._drag=null;c.classList.remove("dragging");});
  }
  c.addEventListener("click",()=>openSlot(s));
  c.append(el("div",{class:"sbar"}));
  c.append(el("div",{class:"stitle"},s.titolo||(s.tipo==="esterno"?"Martedì Immobiliare":p.emoji+" "+p.label)));
  c.append(el("div",{class:"smeta"},s.ora||"—",statoMini(s.stato)));
  return c;
}
function statoMini(st){const map={vuoto:"○",bozza:"◔",pronto:"◑",approvato:"◕",ok_confermato:"◕",pubblicato:"●",errore:"⚠",bloccato:"⊘",saltato:"–",esterno:"↗"};return el("span",{style:st==="errore"?"color:var(--danger)":st==="pubblicato"?"color:var(--ok)":""},map[st]||"○");}
function calList(){
  const list=el("div",{class:"clist"});
  const items=visibleSlots().filter(s=>s.data>=todayStr()||["bozza","pronto","errore"].includes(s.stato))
    .sort((a,b)=>(a.data+a.ora).localeCompare(b.data+b.ora));
  if(!items.length)return emptyState("🗓️","Nessuno slot in vista","Gli slot futuri appariranno qui.");
  items.forEach(s=>{
    const p=PILLARS[s.pilastro]||PILLARS.esterno;
    list.append(el("div",{class:"crow",onclick:()=>openSlot(s)},
      el("div",{class:"cdate"},fmtDate(s.data),el("small",{},s.ora||"")),
      el("div",{class:"ctitle"},s.titolo||el("span",{style:"color:var(--muted)"},p.emoji+" "+p.label+" — slot vuoto"),
        el("small",{},(s.caption_ig||"").slice(0,90))),
      el("div",{class:"cactions"},el("span",{class:"chip p-"+s.pilastro},p.emoji+" "+p.label),statoBadge(s))
    ));
  });
  return list;
}
function statoBadge(s){
  const b=el("span",{class:"st st-"+s.stato},el("span",{class:"d"}),s.stato);
  if(s.stato==="errore")b.addEventListener("click",e=>{e.stopPropagation();modalInfo("Dettaglio errore",s.note||"Nessun dettaglio disponibile. Controlla i log n8n.");});
  return b;
}

function openSlot(s){
  if(s.tipo==="esterno"){modalInfo("Gestito esternamente","Il Martedì Immobiliare è pubblicato da un altro workflow. Questo slot è solo informativo e non si modifica da qui.");return;}
  startComposer(s);
}
async function moveSlot(id,newDate){
  const s=slotById(id);if(!s||s.data===newDate)return;
  const old=s.data;s.data=newDate;s.aggiornato_il=new Date().toISOString();render();
  try{await api("redazione-salva-contenuto",{contenuto:s});toast("Spostato al "+fmtDate(newDate)+".","ok");}
  catch(e){s.data=old;render();toast("Spostamento non salvato: "+e.message,"err");}
}

async function accettaIdea(i){
  const tipo=i.pilastro==="reel"?"reel":"entrambi";
  const slot=findFreeSlot(i.pilastro,tipo);
  i.stato="accettata";
  try{await api("redazione-salva-idea",{idea:i});}catch(e){}
  startComposer(slot,{idea:i});
  toast(slot?("Bozza creata nello slot del "+fmtDate(slot.data)):"Idea aperta nel Composer.","ok");
}
function scartaIdea(i){
  modalConfirm("Scartare questa idea?",i.titolo,"Scarta",async()=>{
    const prev=i.stato;i.stato="scartata";render();
    try{await api("redazione-salva-idea",{idea:i});toastUndo("Idea scartata.",async()=>{i.stato=prev;await api("redazione-salva-idea",{idea:i});render();});}
    catch(e){i.stato=prev;render();toast("Errore: "+e.message,"err");}
  },"danger");
}
function findFreeSlot(pilastro,tipo){
  const today=todayStr();
  const cands=visibleSlots().filter(s=>s.stato==="vuoto"&&s.data>=today&&(s.pilastro===pilastro||(tipo==="reel"&&s.pilastro==="reel")))
    .sort((a,b)=>(a.data).localeCompare(b.data));
  return cands[0]||null;
}
function openGeneraIdee(){
  let n=8,pil="";
  const inpN=el("input",{class:"inp",type:"number",min:"1",max:"20",value:"8",oninput:e=>n=+e.target.value});
  const selP=el("select",{class:"sel",onchange:e=>pil=e.target.value},
    el("option",{value:""},"Tutti i pilastri"),
    ...["territorio","dati","reale","reel"].map(p=>el("option",{value:p},PILLARS[p].emoji+" "+PILLARS[p].label)));
  modalCustom("Genera idee ora","Riempi in blocco i periodi di chiusura. L'agente lavora in background: le idee compaiono qui man mano.",
    [el("div",{class:"field"},el("label",{},"Quante idee (max 20)"),inpN),
     el("div",{class:"field"},el("label",{},"Pilastro"),selP)],
    "Genera",async(close)=>{
      close();
      const prog=progressToast("Genero "+n+" idee dal territorio…");
      try{await api("redazione-agente-idee",{quantita:n,pilastro:pil});
        prog.done();pollIdee(6);
      }catch(e){prog.remove();toast("Errore: "+e.message,"err");}
    });
}
async function pollIdee(times){
  // l'agente è asincrono: ricarico qualche volta
  const before=S.data.idee.filter(i=>i.stato==="nuova").length;
  let n=0;const iv=setInterval(async()=>{
    n++;try{const res=await api("redazione-carica-dati",{});S.data.idee=res.idee||[];}catch(e){}
    const now=S.data.idee.filter(i=>i.stato==="nuova").length;
    if(now>before){clearInterval(iv);if(S.view==="idee")render();toast((now-before)+" nuove idee pronte.","ok");}
    else if(n>=times){clearInterval(iv);if(S.view==="idee")render();toast("Idee in arrivo: ricarica tra poco se non le vedi.","warn");}
  },7000);
}

const STEPS=[["idea","Idea"],["intervista","Intervista"],["testo","Testo"],["hook","Hook"],["foto","Media"],["anteprima","Anteprima"],["programma","Programma"]];
function saveStepLocal(){const c=S.composer;if(c&&c.id)try{localStorage.setItem('rdz_step_'+c.id,JSON.stringify({step:c.step,hookScelto:c.hookScelto,caption_ig:c.caption_ig||"",testo_blog:c.testo_blog||"",titolo:c.titolo||""}));}catch(e){}}
async function silentSaveDraft(){const c=S.composer;if(!c)return;const existing=slotById(c.id);const stato=existing&&["pronto","approvato","ok_confermato"].includes(existing.stato)?existing.stato:"bozza";const row=composerToRow(stato);try{await api("redazione-salva-contenuto",{contenuto:row});upsertLocal(row);c.dirty=false;render();}catch(e){}}
async function eliminaBozza(id){if(!confirm("Eliminare questa bozza?"))return;const slot=slotById(id);if(!slot)return;const row={...slot,stato:"eliminata"};try{await api("redazione-salva-contenuto",{contenuto:row});const idx=S.data.calendario.findIndex(x=>x.id===id);if(idx>=0)S.data.calendario.splice(idx,1);try{localStorage.removeItem('rdz_int_'+id);localStorage.removeItem('rdz_step_'+id);}catch(e){}render();toast("Bozza eliminata.","ok");}catch(e){toast("Errore eliminazione.","err");}}
function startComposer(slot,extra={}){
  const idea=extra.idea;
  const _savedInt=(()=>{if(!slot)return null;try{const s=localStorage.getItem('rdz_int_'+slot.id);return s?JSON.parse(s):null;}catch(e){return null;}})();
  const _savedStep=(()=>{if(!slot)return null;try{const s=localStorage.getItem('rdz_step_'+slot.id);return s?JSON.parse(s):null;}catch(e){return null;}})();
  const _savedCaption=_savedStep?(_savedStep.caption_ig||""):"";
  const _savedBlog=_savedStep?(_savedStep.testo_blog||""):"";
  const _savedTitolo=_savedStep?(_savedStep.titolo||""):"";
  const _caption=slot?(slot.caption_ig||_savedCaption):_savedCaption;
  const _blog=slot?(slot.testo_blog||_savedBlog):_savedBlog;
  const _defaultStep=slot?(_caption?"testo":((_savedInt||slot.id_intervista)?"intervista":"idea")):"idea";
  S.composer={
    id:slot?slot.id:uid("ig"),
    isNew:!slot,
    data:slot?slot.data:"",ora:slot?slot.ora:"",
    pilastro:slot?slot.pilastro:(idea?idea.pilastro:"territorio"),
    tipo:slot?(slot.tipo||"post_ig"):(idea?(idea.pilastro==="reel"?"reel":"entrambi"):"post_ig"),
    tema:idea?idea.titolo:(slot&&slot.tema?slot.tema:slot&&slot.titolo?slot.titolo:""),
    titolo:slot?(slot.titolo||_savedTitolo||""):"",
    caption_ig:_caption,
    testo_blog:_blog,
    brief_foto:idea?idea.brief_foto:(slot?slot.note:"")||"",
    foto:(slot&&slot.url_foto?slot.url_foto.split(",").filter(Boolean):[]),
    url_video:slot?slot.url_video||"":"",
    overlay:[],
    reelMode:"foto",
    geotag:slot?slot.geotag||"Brugherio":"Brugherio",
    richiedi_ok:slot?String(slot.richiedi_ok_esplicito).toLowerCase()==="true":false,
    id_intervista:slot?slot.id_intervista||"":"",
    intervista:_savedInt,
    step:_savedStep?_savedStep.step:_defaultStep,
    hooks:[],hookScelto:_savedStep?_savedStep.hookScelto:null,
    dirty:false, generating:false, uploading:false,
    cta_applicata:slot?slot.cta==="valutatore":false
  };
  S.view="composer";render();
}
function ComposerView(){
  const c=S.composer;
  if(!c)return emptyState("✍️","Nessun contenuto aperto","Scegli uno slot dal calendario o parti da un'idea.");
  const frag=el("div",{});
  frag.append(el("div",{class:"phead"},
    el("div",{},el("h1",{},c.isNew?"Nuovo contenuto":"Modifica contenuto"),
      el("div",{class:"sub"},"Intervista, non generazione cieca: partiamo dalla tua opinione. Lettore immaginato: un proprietario di Brugherio che potrebbe vendere.")),
    el("div",{class:"hrow"},
      el("button",{class:"btn btn-g btn-sm",onclick:saveDraft},c.dirty?"● Salva bozza":"Salvato"),
      el("button",{class:"btn btn-g btn-sm",onclick:()=>nav("calendario")},"Chiudi"))
  ));
  // stepper
  const canGo=stepGuards();
  const stepper=el("div",{class:"stepper"});
  STEPS.forEach(([k,l],idx)=>{
    const done=canGo.done.includes(k);
    stepper.append(el("button",{class:(c.step===k?"on ":"")+(done?"done":""),
      disabled:!canGo.reach.includes(k)&&c.step!==k,
      onclick:()=>{c.step=k;render();}},
      el("span",{class:"sn"},"Step "+(idx+1)),el("span",{class:"sl"},l)));
  });
  frag.append(stepper);
  frag.append(el("div",{class:"cwrap"},stepPanel(),previewPanel()));
  // keyboard shortcuts
  document.onkeydown=e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();saveDraft();}
    if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();gotoNextStep();}
  };
  return frag;
}
function stepGuards(){
  const c=S.composer;
  const hasIntervista=c.intervista&&c.intervista.risposte&&c.intervista.risposte.some(r=>String(r||"").trim());
  const hasFoto=c.tipo==="reel"?(c.url_video||c.foto.length>=3):c.foto.length>0;
  const hasTesto=!!(c.caption_ig&&(c.tipo!=="articolo_blog"||c.testo_blog));
  const hasHook=!!(c.hookScelto&&c.hookScelto.testo);
  const done=[];if(c.tema)done.push("idea");if(hasIntervista)done.push("intervista");if(hasTesto)done.push("testo");if(hasHook)done.push("hook");if(hasFoto)done.push("foto");
  const reach=["idea"];if(c.tema)reach.push("intervista");if(hasIntervista)reach.push("testo");if(hasTesto)reach.push("hook");if(hasHook)reach.push("foto","anteprima","programma");
  return {done,reach,hasIntervista,hasFoto,hasTesto,hasHook};
}
function gotoNextStep(){const i=STEPS.findIndex(s=>s[0]===S.composer.step);if(i<STEPS.length-1){const g=stepGuards();const next=STEPS[i+1][0];if(g.reach.includes(next)){S.composer.step=next;render();}else toast("Completa prima questo step.","warn");}}

function mediaUploader(kind){

    kind==="mp4"?"Trascina qui l'MP4 (9:16, max 90s) o clicca":
    kind==="video-clips"?"Trascina qui le clip (4-6, ~5s l'una) o clicca":
    "Trascina qui le foto o clicca — puoi selezionarne più insieme");

  drop.addEventListener("drop",e=>{e.preventDefault();drop.classList.remove("over");handleFiles([...e.dataTransfer.files],kind);});
  const wrap=el("div",{class:"field"},drop);
  // thumbs
  if(kind==="mp4"&&c.url_video){wrap.append(el("div",{class:"thumbs"},el("div",{class:"thumb"},el("video",{src:c.url_video,muted:true,playsinline:true}),el("button",{class:"rm",onclick:()=>{c.url_video="";c.dirty=true;render();}},"✕"))));}

      el("button",{class:"rm",onclick:()=>{c.foto.splice(i,1);c.dirty=true;updatePreview();render();}},"✕"))));
    wrap.append(t);
  }
  if(c.uploading)wrap.append(el("div",{style:"font-size:12px;color:var(--muted);margin-top:8px"},el("span",{class:"sp",style:"display:inline-block;width:12px;height:12px;border-width:2px;vertical-align:middle;margin-right:6px"}),"Carico su Cloudinary…"));
  return wrap;

async function handleFiles(files,kind){

function distribuisci(){
  const b=S.batch;
  const today=todayStr();
  const freeByPil={};
  visibleSlots().filter(s=>s.stato==="vuoto"&&s.data>=today).sort((a,b2)=>a.data.localeCompare(b2.data)).forEach(s=>{(freeByPil[s.pilastro]=freeByPil[s.pilastro]||[]).push(s);});
  let placed=0;
  b.rows.forEach(r=>{if(r.data)return;const pool=freeByPil[r.pilastro]||freeByPil.reel||[];const slot=pool.shift();if(slot){r.data=slot.data;r.ora=slot.ora;r._slotId=slot.id;placed++;}});
  render();toast(placed?("Assegnati "+placed+" contenuti ai prossimi slot liberi."):"Nessuno slot libero coerente trovato.",placed?"ok":"warn");
}
async function bulkSave(stato,rows){
  const payload=rows.map(r=>batchRowToContenuto(r,stato));
  if(!payload.length)return;
  try{await api("redazione-salva-contenuto",{contenuti:payload});payload.forEach(upsertLocal);toast(payload.length+" contenuti salvati in bozza.","ok");}
  catch(e){toast("Errore: "+e.message,"err");}
}
async function bulkReady(rows){
  const ok=rows.filter(r=>r.data&&(r.tipo==="reel"?(r.url_video||r.foto.length>=3):r.foto.length>0));
  const ko=rows.length-ok.length;
  if(!ok.length){toast("Nessun contenuto ha foto + slot: restano in bozza.","warn");return;}
  const payload=ok.map(r=>batchRowToContenuto(r,"pronto"));
  try{await api("redazione-salva-contenuto",{contenuti:payload});payload.forEach(upsertLocal);
    toast(ok.length+" pronti"+(ko?", "+ko+" ancora senza foto/slot (in bozza)":"")+".",ko?"warn":"ok");}
  catch(e){toast("Errore: "+e.message,"err");}
}
function batchRowToContenuto(r,stato){
  const hasFoto=r.tipo==="reel"?(r.url_video||r.foto.length>=3):r.foto.length>0;
  return {id:r.id,data:r.data,ora:r.ora||"",pilastro:r.pilastro,tipo:r.tipo,titolo:r.titolo,caption_ig:r.caption_ig,
    testo_blog:r.testo_blog,url_foto:r.foto.join(","),url_video:r.url_video,
    stato:(stato==="pronto"&&hasFoto&&r.data)?"pronto":"bozza",geotag:"Brugherio",note:r.brief_foto};
}

          const fin=el("input",{type:"file",accept:"image/*,video/*",multiple:true,style:"display:none"});
          fin.onchange=async e=>{const files=[...e.target.files];lab.textContent="…";try{const urls=[];let vid="";for(const f of files){const res=await uploadFoto(f);if(f.type.startsWith("video"))vid=res.url;else urls.push(res.url);}

function guessPlace(s){
  const t=((s.note||"")+" "+(s.titolo||"")+" "+(s.brief_foto||"")).toLowerCase();
  const m=t.match(/via\s+[a-zà-ù]+|piazza\s+[a-zà-ù]+|cantiere[^,.]*|quartiere\s+[a-zà-ù]+|san damiano|increa|kennedy|centro/i);
  if(m)return m[0].replace(/\b\w/g,c=>c.toUpperCase()).trim();
  if(/planimetr|ufficio|tavolo|scrivania/.test(t))return "Ufficio";
  return "Da definire";
}
function exportSpesa(){
  const need=visibleSlots().filter(s=>s.stato==="bozza"&&s.tipo!=="esterno"&&!(s.url_foto&&s.url_foto.trim())&&!(s.url_video&&s.url_video.trim()));
  if(!need.length){toast("Niente da esportare.","warn");return;}
  const groups={};need.forEach(s=>{const p=guessPlace(s);(groups[p]=groups[p]||[]).push(s);});
  let txt="🛒 LISTA DELLA SPESA MEDIA — Redazione Edilnord\n\n";
  Object.keys(groups).forEach(pl=>{txt+=(pl==="Ufficio"?"🏠 ":"📍 ")+pl+"\n";groups[pl].forEach(s=>{txt+="  • "+(s.note||s.titolo||PILLARS[s.pilastro].label)+" ("+fmtDate(s.data)+")\n";});txt+="\n";});
  modalCustom("Lista della spesa","Copia il testo e incollalo su Telegram, oppure invialo direttamente.",
    [el("textarea",{class:"ta big",readonly:true},txt)],
    "Copia negli appunti",close=>{navigator.clipboard.writeText(txt).then(()=>{toast("Copiato.","ok");close();});},
    "Invia su Telegram",async close=>{try{await api("redazione-salva-config",{config:[]});}catch(e){}
      // usa il webhook telegram-cmd? no: nessun endpoint invio libero. Consiglio copia.
      navigator.clipboard.writeText(txt);toast("Copiato: incollalo nel bot Telegram.","ok");close();});
}
